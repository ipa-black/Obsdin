name: Build OBSIDIAN IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch: # يسمح لك بتشغيل البناء يدوياً بضغطة زر

jobs:
  build-and-package:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Select Latest Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Compile OBSIDIAN Source Code
        run: |
          # نقوم ببناء التطبيق وتجاهل التوقيع (Signing) لأنك ستوقعه بنفسك لاحقاً
          xcodebuild clean build \
            -project OBSIDIAN.xcodeproj \
            -scheme OBSIDIAN \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package into Raw IPA
        run: |
          # صناعة مجلد Payload المطلوب لتكوين أي ملف IPA
          mkdir -p Payload
          # نقل التطبيق المبني إلى داخل المجلد
          mv build/Release-iphoneos/OBSIDIAN.app Payload/
          # ضغط المجلد وتحويله إلى صيغة ipa
          zip -r OBSIDIAN.ipa Payload/

      - name: Upload Finished IPA Artifact
        uses: actions/upload-artifact@v3
        with:
          name: OBSIDIAN-Raw-App
          path: OBSIDIAN.ipa
