name: Build OBSIDIAN IPA & Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 1. تثبيت أداة توليد المشاريع
      - name: Install XcodeGen
        run: brew install xcodegen

      # 2. توليد ملف المشروع مع حصر المكونات في ملفات السويفت فقط لمنع خلط الأكواد
      - name: Generate Xcode Project Dynamically
        run: |
          cat << 'EOF' > project.yml
          name: OBSIDIAN
          options:
            bundleIdPrefix: com.obsidian
          targets:
            OBSIDIAN:
              type: application
              platform: iOS
              deploymentTarget: "16.0"
              sources:
                - path: .
                  includes:
                    - "**.swift"
              settings:
                base:
                  CODE_SIGN_IDENTITY: "-"
                  CODE_SIGNING_REQUIRED: "NO"
                  CODE_SIGNING_ALLOWED: "YES"
                  AD_HOC_CODE_SIGNING_ALLOWED: "YES"
                  GENERATE_INFOPLIST_FILE: "YES"
                  INFOPLIST_KEY_CFBundleDisplayName: "OBSIDIAN"
                  INFOPLIST_KEY_LSRequiresIPhoneOS: "YES"
                  MARKETING_VERSION: "1.0.0"
                  CURRENT_PROJECT_VERSION: "1"
          EOF
          xcodegen generate

      - name: Select Latest Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      # 3. بناء التطبيق باستخدام التوقيع المحلي الذكي (Ad-Hoc Sign) وتغيير الإعداد لوضع Debug لضمان الاستقرار
      - name: Compile OBSIDIAN Source Code
        run: |
          xcodebuild clean build \
            -project OBSIDIAN.xcodeproj \
            -scheme OBSIDIAN \
            -sdk iphoneos \
            -configuration Debug \
            CONFIGURATION_BUILD_DIR=${PWD}/build_output \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      # 4. تجميع ملف الـ IPA النظيف
      - name: Package into Raw IPA
        run: |
          mkdir -p Payload
          mv build_output/OBSIDIAN.app Payload/
          zip -r OBSIDIAN.ipa Payload/

      # 5. تنظيف التاج القديم من الريليز
      - name: Clean Old Release Tag
        run: |
          gh release delete latest-app --yes || true
          git push --delete origin latest-app || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 6. رفع ملف الـ IPA الجاهز تماماً للتحميل والتثبيت
      - name: Publish IPA to Releases
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest-app
          name: "OBSIDIAN Production IPA"
          body: "تم تجميع الأكواد البرمجية بنجاح وصناعة ملف الـ IPA الخام."
          draft: false
          prerelease: false
          files: OBSIDIAN.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
