name: Build OBSIDIAN IPA & Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# إعطاء الصلاحية للأكشن لإنشاء وتعديل قسم الـ Releases
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Select Latest Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Compile OBSIDIAN Source Code
        run: |
          xcodebuild clean build \
            -project OBSIDIAN.xcodeproj \
            -scheme OBSIDIAN \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package into Raw IPA
        run: |
          mkdir -p Payload
          mv build/Release-iphoneos/OBSIDIAN.app Payload/
          zip -r OBSIDIAN.ipa Payload/

      - name: Clean Old Release Tag
        run: |
          # نحذف الإصدار القديم إن وجد لضمان تحديث الرابط دائماً
          gh release delete latest-app --yes || true
          git push --delete origin latest-app || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish IPA to Releases
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest-app
          name: "OBSIDIAN Latest IPA"
          body: "تم بناء هذا التطبيق تلقائياً عبر محرك OBSIDIAN. جاهز للتثبيت."
          draft: false
          prerelease: false
          files: OBSIDIAN.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
