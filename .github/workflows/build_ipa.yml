name: Build OBSIDIAN IPA & Release (Self-Synthesizing)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install XcodeGen
        run: brew install xcodegen

      # 1. خلق ملفات السويفت برمجياً داخل السيرفر لضمان عدم ضياعها أو فقدانها
      - name: Synthesize Swift Source Code
        run: |
          mkdir -p Sources
          
          # ملف التشغيل الرئيسي
          cat << 'EOF' > Sources/OBSIDIANApp.swift
          import SwiftUI
          @main
          struct OBSIDIANApp: App {
              var body: some Scene {
                  WindowGroup {
                      MainDashboardView()
                          .preferredColorScheme(.dark)
                          .environment(\.layoutDirection, .rightToLeft)
                  }
              }
          }
          EOF
          
          # ملف واجهة المستخدم الممتلئة والكاملة
          cat << 'EOF' > Sources/MainDashboardView.swift
          import SwiftUI
          struct ObsidianCrystal: Shape {
              func path(in rect: CGRect) -> Path {
                  var path = Path()
                  let w = rect.width, h = rect.height
                  path.move(to: CGPoint(x: w*0.5, y: 0))
                  path.addLine(to: CGPoint(x: w, y: h*0.4))
                  path.addLine(to: CGPoint(x: w*0.7, y: h))
                  path.addLine(to: CGPoint(x: w*0.3, y: h))
                  path.addLine(to: CGPoint(x: 0, y: h*0.4))
                  path.closeSubpath()
                  return path
              }
          }
          struct ShareSheetWrapper: UIViewControllerRepresentable {
              var activityItems: [Any]
              func makeUIViewController(context: Context) -> UIActivityViewController {
                  UIActivityViewController(activityItems: activityItems, applicationActivities: nil)
              }
              func updateUIViewController(_ uiViewController: UIActivityViewController, context: Context) {}
          }
          struct CustomField: View {
              var placeholder: String
              @Binding var text: String
              var isSecure: Bool
              var body: some View {
                  Group {
                      if isSecure { SecureField(placeholder, text: $text) }
                      else { TextField(placeholder, text: $text) }
                  }
                  .padding(14).background(Color(red: 0.03, green: 0.03, blue: 0.04))
                  .foregroundColor(.white).cornerRadius(10)
                  .overlay(RoundedRectangle(cornerRadius: 10).stroke(Color.white.opacity(0.1), lineWidth: 1))
                  .textInputAutocapitalization(.never).disableAutocorrection(true)
              }
          }
          struct MainDashboardView: View {
              @AppStorage("githubUser") private var githubUser: String = ""
              @AppStorage("repoName") private var repoName: String = ""
              @AppStorage("githubPAT") private var githubPAT: String = ""
              @StateObject private var viewModel = CompilerViewModel()
              private let obsBlack = Color(red: 0.02, green: 0.02, blue: 0.03)
              private let obsGray = Color(red: 0.08, green: 0.08, blue: 0.10)
              private let obsGold = Color(red: 0.85, green: 0.72, blue: 0.25)
              var body: some View {
                  GeometryReader { geometry in
                      ZStack {
                          obsBlack.ignoresSafeArea()
                          VStack(spacing: 0) {
                              HStack(spacing: 15) {
                                  ObsidianCrystal().fill(LinearGradient(gradient: Gradient(colors: [obsGold, .orange]), startPoint: .top, endPoint: .bottom))
                                      .frame(width: 25, height: 35)
                                  Text("OBSIDIAN").font(.system(size: 26, weight: .black, design: .monospaced)).foregroundColor(.white).tracking(2)
                                  Spacer()
                              }
                              .padding(.horizontal, 24).padding(.vertical, 16).background(obsGray.ignoresSafeArea(edges: .top))
                              ScrollView(showsIndicators: false) {
                                  VStack(spacing: 24) {
                                      VStack(alignment: .leading, spacing: 16) {
                                          Label("بوابة العبور (Auth)", systemImage: "network.badge.shield.half.filled").font(.headline).foregroundColor(obsGold)
                                          CustomField(placeholder: "اسم المستخدم", text: $githubUser, isSecure: false)
                                          CustomField(placeholder: "اسم المستودع", text: $repoName, isSecure: false)
                                          CustomField(placeholder: "رمز PAT", text: $githubPAT, isSecure: true)
                                      }
                                      .padding(20).background(obsGray).cornerRadius(18)
                                      .overlay(RoundedRectangle(cornerRadius: 18).stroke(obsGold.opacity(0.4), lineWidth: 1.5))
                                      .padding(.horizontal, 16).padding(.top, 24)
                                      VStack(alignment: .leading, spacing: 12) {
                                          Label("بيئة التطوير (Objective-C)", systemImage: "terminal.fill").font(.headline).foregroundColor(obsGold)
                                          TextEditor(text: $viewModel.objCCode)
                                              .font(.system(.body, design: .monospaced)).foregroundColor(.white)
                                              .scrollContentBackground(.hidden).background(obsBlack)
                                              .frame(minHeight: geometry.size.height * 0.35).cornerRadius(12)
                                              .overlay(RoundedRectangle(cornerRadius: 12).stroke(Color.white.opacity(0.1), lineWidth: 1))
                                      }
                                      .padding(20).background(obsGray).cornerRadius(18)
                                      .overlay(RoundedRectangle(cornerRadius: 18).stroke(obsGold.opacity(0.4), lineWidth: 1.5))
                                      .padding(.horizontal, 16)
                                      VStack(spacing: 16) {
                                          Button(action: { Task { await viewModel.startCompilation(user: githubUser, repo: repoName, token: githubPAT) } }) {
                                              HStack {
                                                  if viewModel.isLoading { ProgressView().tint(obsBlack).padding(.trailing, 8) }
                                                  Text(viewModel.isLoading ? "جاري حقن الأكواد..." : "توليد الـ Dylib الآن").font(.system(size: 20, weight: .bold))
                                              }
                                              .frame(maxWidth: .infinity).padding(.vertical, 20)
                                              .background(viewModel.objCCode.isEmpty ? Color.gray.opacity(0.3) : obsGold)
                                              .foregroundColor(viewModel.objCCode.isEmpty ? .gray : obsBlack).cornerRadius(18)
                                          }
                                          .disabled(viewModel.isLoading || viewModel.objCCode.isEmpty)
                                          if viewModel.canDownload {
                                              Button(action: { Task { await viewModel.fetchCompiledFile(user: githubUser, repo: repoName, token: githubPAT) } }) {
                                                  HStack {
                                                      if viewModel.isDownloading { ProgressView().tint(.white).padding(.trailing, 8) }
                                                      Image(systemName: "square.and.arrow.down.fill").font(.system(size: 22))
                                                      Text(viewModel.isDownloading ? "جاري سحب الملف..." : "حفظ الـ Dylib").font(.system(size: 20, weight: .bold))
                                                  }
                                                  .frame(maxWidth: .infinity).padding(.vertical, 20)
                                                  .background(Color.green.opacity(0.85)).foregroundColor(.white).cornerRadius(18)
                                              }
                                              .disabled(viewModel.isDownloading)
                                          }
                                          if !viewModel.statusMessage.isEmpty {
                                              Text(viewModel.statusMessage).font(.system(size: 14, weight: .medium, design: .monospaced))
                                                  .foregroundColor(.gray).multilineTextAlignment(.center).frame(maxWidth: .infinity)
                                                  .padding(16).background(obsBlack).cornerRadius(12)
                                                  .overlay(RoundedRectangle(cornerRadius: 12).stroke(Color.white.opacity(0.05), lineWidth: 1))
                                          }
                                      }
                                      .padding(.horizontal, 16).padding(.bottom, 40)
                                  }
                              }
                          }
                      }
                  }
                  .sheet(isPresented: $viewModel.showShareSheet) {
                      if let url = viewModel.readyFileURL { ShareSheetWrapper(activityItems: [url]) }
                  }
              }
          }
          EOF
          
          # ملف التحكم المنطقي
          cat << 'EOF' > Sources/CompilerViewModel.swift
          import SwiftUI
          @MainActor
          final class CompilerViewModel: ObservableObject {
              @Published var objCCode: String = ""
              @Published var statusMessage: String = ""
              @Published var isLoading: Bool = false
              @Published var isDownloading: Bool = false
              @Published var canDownload: Bool = false
              @Published var readyFileURL: URL? = nil
              @Published var showShareSheet: Bool = false
              func startCompilation(user: String, repo: String, token: String) async {
                  guard !user.isEmpty, !repo.isEmpty, !token.isEmpty else { statusMessage = "⚠️ نرجو إكمال كافة الحقول الأمنية."; return }
                  isLoading = true; canDownload = false; statusMessage = "⚙️ جاري تشفير الطلب وإرساله..."
                  do {
                      try await GitHubService.shared.triggerWorkflow(user: user, repo: repo, token: token, code: objCCode)
                      statusMessage = "✅ تم الإرسال. يجري التجميع... سيظهر الزر قريباً."
                      try await Task.sleep(nanoseconds: 3_000_000_000); canDownload = true
                  } catch { statusMessage = "❌ فشل الاتصال: \(error.localizedDescription)" }
                  isLoading = false
              }
              func fetchCompiledFile(user: String, repo: String, token: String) async {
                  isDownloading = true; statusMessage = "📥 يتم سحب الملف الثنائي..."
                  do {
                      let fileURL = try await GitHubService.shared.downloadDylib(user: user, repo: repo, token: token)
                      self.readyFileURL = fileURL; self.showShareSheet = true; statusMessage = "🎉 جاهز! احفظ الملف الآن."
                  } catch { statusMessage = "⏳ جيت هاب لا يزال يبني الملف، انتظر قليلاً." }
                  isDownloading = false
              }
          }
          EOF
          
          # ملف الاتصال بالشبكة
          cat << 'EOF' > Sources/GitHubService.swift
          import Foundation
          struct GitHubDispatchPayload: Encodable {
              let eventType: String
              let clientPayload: ClientPayload
              enum CodingKeys: String, CodingKey { case eventType = "event_type"; case clientPayload = "client_payload" }
          }
          struct ClientPayload: Encodable { let code: String }
          enum GitHubError: Error, LocalizedError {
              case invalidURL; case requestFailed(Int)
              var errorDescription: String? {
                  switch self { case .invalidURL: return "رابط غير صالح."; case .requestFailed(let code): return "تم رفض الوصول: \(code)" }
              }
          }
          final class GitHubService {
              static let shared = GitHubService(); private init() {}
              func triggerWorkflow(user: String, repo: String, token: String, code: String) async throws {
                  let urlString = "https://api.github.com/repos/\(user)/\(repo)/dispatches"
                  guard let url = URL(urlString: urlString) else { throw GitHubError.invalidURL }
                  var request = URLRequest(url: url)
                  request.httpMethod = "POST"; request.setValue("Bearer \(token)", forHTTPHeaderField: "Authorization")
                  request.setValue("application/vnd.github.v3+json", forHTTPHeaderField: "Accept")
                  request.setValue("application/json", forHTTPHeaderField: "Content-Type")
                  let payload = GitHubDispatchPayload(eventType: "generate-dylib", clientPayload: ClientPayload(code: code))
                  request.httpBody = try JSONEncoder().encode(payload)
                  let (_, response) = try await URLSession.shared.data(for: request)
                  if let httpResponse = response as? HTTPURLResponse, httpResponse.statusCode != 204 { throw GitHubError.requestFailed(httpResponse.statusCode) }
              }
              func downloadDylib(user: String, repo: String, token: String) async throws -> URL {
                  let urlString = "https://raw.githubusercontent.com/\(user)/\(repo)/main/generated_dylibs/OBSIDIAN_latest.dylib"
                  guard let url = URL(urlString: urlString) else { throw GitHubError.invalidURL }
                  var request = URLRequest(url: url)
                  request.setValue("Bearer \(token)", forHTTPHeaderField: "Authorization")
                  let (localURL, response) = try await URLSession.shared.download(for: request)
                  if let httpResponse = response as? HTTPURLResponse, httpResponse.statusCode != 200 { throw GitHubError.requestFailed(httpResponse.statusCode) }
                  let destinationURL = FileManager.default.temporaryDirectory.appendingPathComponent("OBSIDIAN_latest.dylib")
                  try? FileManager.default.removeItem(at: destinationURL)
                  try FileManager.default.moveItem(at: localURL, to: destinationURL)
                  return destinationURL
              }
          }
          EOF

      # 2. توليد Info.plist نقي تماماً ليعمل في Feather بدون أخطاء التوقيع
      - name: Generate Perfect Info.plist
        run: |
          cat << 'EOF' > Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>OBSIDIAN</string>
              <key>CFBundleIdentifier</key>
              <string>com.obsidian.compiler</string>
              <key>CFBundleName</key>
              <string>OBSIDIAN</string>
              <key>CFBundleDisplayName</key>
              <string>OBSIDIAN</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UIRequiredDeviceCapabilities</key>
              <array><string>arm64</string></array>
          </dict>
          </plist>
          EOF

      # 3. تكوين المشروع مع توجيه صريح للمجلد الذي تم خلقه الآن
      - name: Generate Xcode Project Dynamically
        run: |
          cat << 'EOF' > project.yml
          name: OBSIDIAN
          options:
            bundleIdPrefix: com.obsidian
          targets:
            OBSIDIAN:
              type: application
              platform: iOS
              deploymentTarget: "16.0"
              sources:
                - path: Sources
              info:
                path: Info.plist
              settings:
                base:
                  ARCHS: arm64
                  VALID_ARCHS: arm64
                  ONLY_ACTIVE_ARCH: NO
                  ENABLE_BITCODE: NO
          EOF
          xcodegen generate

      - name: Select Latest Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      # 4. بناء المشروع وتجريده من الحماية نهائياً
      - name: Compile Unsigned Source Code
        run: |
          xcodebuild clean build \
            -project OBSIDIAN.xcodeproj \
            -scheme OBSIDIAN \
            -sdk iphoneos \
            -configuration Release \
            -arch arm64 \
            CONFIGURATION_BUILD_DIR=${PWD}/build_output \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # 5. التغليف وإعطاء الصلاحية بعد ضمان أن الملف موجود مئة بالمئة
      - name: Package into Raw Unsigned IPA
        run: |
          mkdir -p Payload
          mv build_output/OBSIDIAN.app Payload/
          chmod +x Payload/OBSIDIAN.app/OBSIDIAN
          zip -r OBSIDIAN.ipa Payload/

      - name: Clean Old Release Tag
        run: |
          gh release delete latest-app --yes || true
          git push --delete origin latest-app || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Finished IPA to Releases
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest-app
          name: "OBSIDIAN Production IPA"
          body: "التطبيق يعمل. الأكواد مدمجة ومحصنة. جاهز لـ Feather."
          draft: false
          prerelease: false
          files: OBSIDIAN.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
