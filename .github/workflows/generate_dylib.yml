name: OBSIDIAN Single Dylib Builder

on:
  repository_dispatch:
    types: [generate-dylib]

permissions:
  contents: write

jobs:
  build-and-archive:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Prepare Directories
        run: |
          mkdir -p generated_dylibs

      # 🔥 التعديل هنا: سحب الكود ونسخ ملفات (.h) و (.m) معاً
      - name: Clone PTFakeTouch Engine
        run: |
          echo "⬇️ جاري سحب كود PTFakeTouch المصدري..."
          git clone https://github.com/PugaTang/PTFakeTouch.git
          mkdir -p touch_engine
          
          # نسخ ملفات الهيدر (.h) وملفات الكود (.m) للمحرك الأساسي وملفات KIF
          cp PTFakeTouch/PTFakeTouch/*.h touch_engine/ || true
          cp PTFakeTouch/PTFakeTouch/*.m touch_engine/ || true
          cp PTFakeTouch/PTFakeTouch/KIF/*.h touch_engine/ || true
          cp PTFakeTouch/PTFakeTouch/KIF/*.m touch_engine/ || true

      - name: Inject Objective-C Payload
        run: |
          cat << 'EOF' > main.m
          ${{ github.event.client_payload.code }}
          EOF

      # 🔥 التعديل هنا: إضافة -I./touch_engine لكي يتعرف المترجم على ملفات الـ .h
      - name: Compile to Dylib (arm64)
        run: |
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          
          echo "🔨 التجميع لبنية: arm64 (مع الدمج المباشر لمحرك PTFakeTouch)"
          
          xcrun -sdk iphoneos clang -dynamiclib -arch arm64 \
            -isysroot "$SDK_PATH" \
            -Wno-deprecated-declarations -fobjc-arc \
            -undefined dynamic_lookup \
            -I./touch_engine \
            main.m touch_engine/*.m -o generated_dylibs/OBSIDIAN_latest.dylib \
            -framework Foundation -framework UIKit -framework CoreGraphics -framework IOKit

          TIMESTAMP=$(date +%s)
          cp generated_dylibs/OBSIDIAN_latest.dylib generated_dylibs/OBSIDIAN_$TIMESTAMP.dylib

      - name: Commit and Push All Assets to Repository
        run: |
          git config --global user.name "OBSIDIAN Engine"
          git config --global user.email "obsidian-bot@users.noreply.github.com"

          git add generated_dylibs/

          if ! git diff-index --quiet HEAD; then
            git commit -m "🔥 OBSIDIAN: تم بناء الأداة مدمجة بمحرك اللمس بنجاح"
            git pull --rebase origin ${{ github.ref }}
            git push origin HEAD:${{ github.ref }}
          else
            echo "✅ كل الملفات مطابقة."
          fi
