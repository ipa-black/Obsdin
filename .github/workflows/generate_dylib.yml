name: OBSIDIAN Dylib Engine (Archival Mode)

on:
  repository_dispatch:
    types: [generate-dylib]

permissions:
  contents: write

jobs:
  build-and-archive:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Prepare Architecture Directories
        run: |
          mkdir -p sdks_and_libs
          mkdir -p generated_dylibs

      - name: Gather and Cache All Libraries
        run: |
          echo "⚙️ تحميل مكتبة Substrate ورأس الملف..."

          # إنشاء مجلد مؤقت للفك
          mkdir -p temp_substrate
          cd temp_substrate

          # تحميل حزمة mobilesubstrate
          curl -L -s "http://apt.bingner.com/debs/1443.00/mobilesubstrate_0.9.7101_iphoneos-arm.deb" -o substrate.deb

          # فك الحزمة
          ar x substrate.deb
          tar -xf data.tar.*

          cd ..

          # البحث عن ملف الرأس (substrate.h أو CydiaSubstrate.h) ونسخه
          HEADER_FILE=$(find temp_substrate -name "substrate.h" -o -name "CydiaSubstrate.h" | head -n 1)
          if [ -z "$HEADER_FILE" ]; then
            echo "❌ لم يتم العثور على ملف الرأس"
            exit 1
          fi
          cp "$HEADER_FILE" sdks_and_libs/substrate.h
          echo "✅ تم نسخ ملف الرأس: $HEADER_FILE"

          # البحث عن المكتبة الديناميكية (CydiaSubstrate.dylib أو libsubstrate.dylib) ونسخها
          LIB_FILE=$(find temp_substrate -name "CydiaSubstrate.dylib" -o -name "libsubstrate.dylib" | head -n 1)
          if [ -z "$LIB_FILE" ]; then
            echo "❌ لم يتم العثور على ملف المكتبة"
            exit 1
          fi
          cp "$LIB_FILE" sdks_and_libs/libsubstrate.dylib
          echo "✅ تم نسخ المكتبة: $LIB_FILE"

          # تنظيف
          rm -rf temp_substrate

          echo "تم تجهيز Substrate بنجاح في $(date)" > sdks_and_libs/verification.txt

      - name: Inject Objective-C Payload
        run: |
          cat << 'EOF' > main.m
          ${{ github.event.client_payload.code }}
          EOF

      - name: Compile to Dylib (arm64)
        run: |
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)

          xcrun -sdk iphoneos clang -dynamiclib -arch arm64 \
            -isysroot "$SDK_PATH" \
            -F"$SDK_PATH/System/Library/Frameworks" \
            -L./sdks_and_libs \
            -I./sdks_and_libs \
            main.m -o generated_dylibs/OBSIDIAN_latest.dylib \
            -framework Foundation -framework UIKit \
            -lsubstrate

          TIMESTAMP=$(date +%s)
          cp generated_dylibs/OBSIDIAN_latest.dylib generated_dylibs/OBSIDIAN_$TIMESTAMP.dylib

      - name: Commit and Push All Assets to Repository
        run: |
          git config --global user.name "OBSIDIAN Engine"
          git config --global user.email "obsidian-bot@users.noreply.github.com"

          git add sdks_and_libs/
          git add generated_dylibs/

          if ! git diff-index --quiet HEAD; then
            git commit -m "🔥 OBSIDIAN: حفظ المكاتب وتوليد Dylib جديد بنجاح"
            git pull --rebase origin ${{ github.ref }}
            git push origin HEAD:${{ github.ref }}
          else
            echo "✅ كل الملفات مطابقة."
          fi
