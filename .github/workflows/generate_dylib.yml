name: OBSIDIAN Build & Release

on:
  repository_dispatch:
    types: [generate-dylib]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup PTFakeTouch Engine
        run: |
          echo "⬇️ جاري سحب كود PTFakeTouch وتسطيحه..."
          git clone https://github.com/PugaTang/PTFakeTouch.git
          mkdir -p touch_engine
          find PTFakeTouch -name "*.h" -exec cp {} touch_engine/ \;
          find PTFakeTouch -name "*.m" -exec cp {} touch_engine/ \;

      - name: Compile to Dylib (arm64)
        env:
          PAYLOAD: ${{ github.event.client_payload.code_base64 }}
          NAME: ${{ github.event.client_payload.dylib_name }}
        run: |
          echo "🔓 جاري فك تشفير الكود المحقون..."
          echo "$PAYLOAD" | base64 --decode > main.m
          
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          
          echo "🔨 التجميع لبنية: arm64"
          xcrun -sdk iphoneos clang -dynamiclib -arch arm64 \
            -isysroot "$SDK_PATH" \
            -fobjc-arc -undefined dynamic_lookup \
            -I./touch_engine \
            main.m touch_engine/*.m -o "${NAME}.dylib" \
            -framework Foundation -framework UIKit -framework CoreGraphics -framework IOKit

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NAME: ${{ github.event.client_payload.dylib_name }}
        run: |
          TAG_NAME="release-${NAME}-$(date +%Y%m%d-%H%M%S)"
          echo "🚀 جاري إنشاء Release جديد بالوسم: $TAG_NAME"
          gh release create "$TAG_NAME" "${NAME}.dylib" \
            --title "🔥 OBSIDIAN: ${NAME}.dylib" \
            --notes "تم التجميع والبناء بنجاح."

      - name: Send Dylib to Telegram
        env:
          TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
          MSG_ID: ${{ github.event.client_payload.wait_msg_id }}
          NAME: ${{ github.event.client_payload.dylib_name }}
        run: |
          curl -s -F document=@"${NAME}.dylib" -F chat_id="$CHAT_ID" "https://api.telegram.org/bot$TOKEN/sendDocument"
          curl -s -X POST "https://api.telegram.org/bot$TOKEN/deleteMessage" -d "chat_id=$CHAT_ID&message_id=$MSG_ID"
